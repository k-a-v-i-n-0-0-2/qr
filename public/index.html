<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zara's 1st Birthday - Digital Diary</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="diary-wrapper">
        <div class="diary-container">
            <div class="diary-spine"></div>
            <div class="diary-page">
                <!-- Decorative Corners -->
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>

                <div class="app-content">
                    <!-- Landing View -->
                    <div id="landing-view" class="view active">
                        <div class="title-section">
                            <span class="sub-title">Welcome to</span>
                            <h1 id="event-title">Zara's 1st Birthday</h1>
                            <div class="ornament">❧</div>
                            <p class="description">Capture a memory for Zara's digital birthday diary.</p>
                        </div>
                        
                        <div class="button-group">
                            <button id="start-camera-btn" class="diary-btn">
                                <img src="seal.png" class="btn-seal" alt="seal">
                                <span>Open Diary Camera</span>
                            </button>
                            
                            <button id="upload-gallery-btn" class="secondary-btn">
                                <span>Add from Gallery</span>
                            </button>
                            
                            <input type="file" id="file-upload" accept="image/*" style="display: none;">
                        </div>

                        <div class="diary-footer">
                            <p>May 2, 2026</p>
                        </div>
                    </div>

                    <!-- Camera View -->
                    <div id="camera-view" class="view">
                        <div class="camera-frame">
                            <div class="camera-wrapper">
                                <video id="camera-feed" autoplay playsinline></video>
                                <div class="camera-overlay"></div>
                                <div class="watermark" id="live-watermark">Zara's 1st Birthday</div>
                            </div>
                        </div>
                        
                        <div class="controls">
                            <button id="capture-btn" class="capture-btn">
                                <div class="inner-circle"></div>
                            </button>
                            <button id="cancel-camera-btn" class="close-btn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Preview View -->
                    <div id="preview-view" class="view">
                        <div class="polaroid-frame">
                            <div class="preview-wrapper">
                                <img id="photo-preview" alt="Preview">
                                <div class="photo-texture"></div>
                            </div>
                        </div>
                        <div id="upload-status" class="status-overlay">
                            <div class="quill-loader"></div>
                            <p>Inking the page...</p>
                        </div>
                    </div>

                    <!-- Success View -->
                    <div id="success-view" class="view">
                        <div class="success-content">
                            <div class="success-seal">
                                <img src="seal.png" alt="seal">
                            </div>
                            <h2>Memory Saved!</h2>
                            <div class="ornament">❦</div>
                            <p>Your photo has been added to Zara's digital diary. Thank you for being part of her story.</p>
                            <button id="take-another-btn" class="diary-btn mini">Write Another Page</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for processing image -->
    <canvas id="photo-canvas" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
